:root{--black:#111;--gray-50:#f8f8f6;--gray-100:#efefed;--gray-200:#dedede;--gray-400:#999;--gray-600:#555;--accent:#b8956a;--accent-dim:#e8dcc8;--radius:10px;--font-main:'NanumSquare','Apple SD Gothic Neo',Pretendard,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-main);background:var(--gray-50);color:var(--black);min-height:100vh;-webkit-font-smoothing:antialiased}

.topbar{background:var(--black);color:#fff;padding:1rem 2.25rem;display:flex;align-items:center;gap:.85rem;border-bottom:2px solid var(--accent)}

.badge{font-size:.7rem;background:rgba(184,149,106,.18);padding:.25rem .6rem;border-radius:99px;color:var(--accent);font-weight:700;letter-spacing:.02em}

.wrap{max-width:860px;margin:2.5rem auto;padding:0 1.5rem 6rem}

.tabs{display:flex;gap:.4rem;margin-bottom:1.75rem;border-bottom:1px solid var(--gray-200);padding-bottom:0}
.tab{padding:.7rem 1.3rem;border-radius:0;font-size:.86rem;font-weight:700;cursor:pointer;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--gray-400);transition:all .15s;margin-bottom:-1px}
.tab:hover{color:var(--black)}
.tab.active{color:var(--black);border-bottom-color:var(--accent)}
.tab-panel{display:none;animation:fadeIn .25s ease}
.tab-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.card{background:#fff;border-radius:var(--radius);padding:1.85rem 2.1rem;margin-bottom:1.25rem;box-shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px -8px rgba(0,0,0,.06);border:1px solid var(--gray-100)}
.card-title{font-size:.95rem;font-weight:800;margin-bottom:1.4rem;padding-bottom:.85rem;border-bottom:1px solid var(--gray-100);color:var(--black);display:flex;align-items:center;gap:.5rem}
.card-title::before{content:'';width:4px;height:14px;background:var(--accent);border-radius:2px;display:inline-block}

.field{margin-bottom:1.15rem}
label{display:block;font-size:.78rem;font-weight:700;color:var(--gray-600);margin-bottom:.4rem;letter-spacing:.01em}
input,select,textarea{width:100%;padding:.65rem .9rem;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.9rem;font-family:inherit;background:#fff;transition:border .15s,box-shadow .15s;color:var(--black)}
input::placeholder,textarea::placeholder{color:#bbb}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(184,149,106,.15)}
textarea{height:360px;font-family:'SF Mono',Consolas,monospace;font-size:.8rem;line-height:1.6;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem}
.hint{font-size:.75rem;color:var(--gray-400);margin-top:.4rem;line-height:1.6}
.hint strong{color:var(--gray-600)}

.btn{display:inline-flex;align-items:center;gap:.45rem;padding:.7rem 1.7rem;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--black);color:#fff}

.spinner{display:none;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}

<script>
const API = 'https://rococo-journal-api.vercel.app/api/publish';
let savedPw = '';

function showAdmin() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('admin-screen').classList.add('active');
}

async function verifyPassword(pw) {
  try {
    const res = await fetch(API.replace('/publish', '/verify'), {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw}),
    });
    const data = await res.json();
    return res.ok && data.ok;
  } catch {
    return false;
  }
}

// 오늘 날짜 기본값 + 자동 로그인 체크
document.addEventListener('DOMContentLoaded', async () => {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('date').value = today;

  const stored = localStorage.getItem('admin_pw');
  if (stored && await verifyPassword(stored)) {
    savedPw = stored;
    showAdmin();
  } else {
    if (stored) localStorage.removeItem('admin_pw');
    document.getElementById('login-screen').classList.add('active');
  }

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });
});

// 로그인
document.getElementById('login-btn').addEventListener('click', async () => {
  const pw = document.getElementById('pw-input').value.trim();
  if (!pw) return;
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  const ok = await verifyPassword(pw);
  btn.disabled = false;
  if (!ok) {
    document.getElementById('login-err').style.display = 'block';
    return;
  }
  savedPw = pw;
  localStorage.setItem('admin_pw', pw);
  showAdmin();
  document.getElementById('login-err').style.display = 'none';
});

// 발행
document.getElementById('publish-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const spinner = document.getElementById('spinner');
  const msgArea = document.getElementById('msg-area');

  const subcat = document.getElementById('subcat').value;
  if (!subcat) { showMsg('카테고리를 선택해주세요.', 'err'); return; }
  const [catPath, subDir] = subcat.split('|');

  btn.disabled = true;
  spinner.style.display = 'inline-block';
  msgArea.innerHTML = '';

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        password: savedPw,
        catPath,
        subDir,
        title: document.getElementById('title').value.trim(),
        summary: document.getElementById('summary').value.trim(),
        date: document.getElementById('date').value,
        content: document.getElementById('content').value,
      }),
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      showMsg(`✅ 발행 완료! 1~2분 후 아래 주소에서 확인하세요.<br>
        <span class="result-url"><a href="${data.url}" target="_blank">${data.url}</a></span>`, 'ok');
      document.getElementById('publish-form').reset();
      document.getElementById('date').value = new Date().toISOString().slice(0,10);
    } else {
      if (res.status === 401) {
        showMsg('비밀번호가 올바르지 않습니다. 페이지를 새로고침해서 다시 로그인하세요.', 'err');
      } else {
        showMsg('❌ 오류: ' + (data.error || '알 수 없는 오류'), 'err');
      }
    }
  } catch (err) {
    showMsg('❌ 네트워크 오류: ' + err.message, 'err');
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
});

function showMsg(html, type) {
  const el = document.getElementById('msg-area');
  el.innerHTML = `<div class="msg ${type}">${html}</div>`;
  el.scrollIntoView({behavior:'smooth', block:'nearest'});
}

// 탭 전환
function switchTab(name) {
  const order = ['write', 'manage', 'stats'];
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', order[i] === name);
  });
  document.getElementById('tab-write').classList.toggle('active', name==='write');
  document.getElementById('tab-manage').classList.toggle('active', name==='manage');
  document.getElementById('tab-stats').classList.toggle('active', name==='stats');
  if (name === 'stats') loadStats();
}

// 통계 불러오기
async function loadStats() {
  const wrap = document.getElementById('stats-wrap');
  wrap.innerHTML = '<p style="color:#aaa;font-size:.85rem">불러오는 중...</p>';
  try {
    const res = await fetch(API.replace('/publish', '/stats') + '?password=' + encodeURIComponent(savedPw));
    const data = await res.json();
    if (!res.ok || !data.ok) {
      wrap.innerHTML = `<p style="color:#c00">오류: ${data.error || '알 수 없는 오류'}</p>`;
      return;
    }

    const topPagesRows = data.topPages.length
      ? data.topPages.map(p => `<tr><td><span class="slug-tag">${p.path}</span></td><td style="text-align:right">${p.count}</td></tr>`).join('')
      : '<tr><td colspan="2" class="empty-state">데이터 없음</td></tr>';

    const topRefRows = data.topReferrers.length
      ? data.topReferrers.map(r => `<tr><td>${r.referrer || '(직접 입력)'}</td><td style="text-align:right">${r.count}</td></tr>`).join('')
      : '<tr><td colspan="2" class="empty-state">데이터 없음</td></tr>';

    wrap.innerHTML = `
      <div class="stat-grid">
        <div class="stat-tile"><label>오늘 방문</label><p>${data.today}</p></div>
        <div class="stat-tile"><label>최근 7일</label><p>${data.last7days}</p></div>
        <div class="stat-tile"><label>전체 누적</label><p>${data.total}</p></div>
      </div>
      <p class="card-title" style="font-size:.85rem;margin-top:0">인기 페이지 TOP 10 (최근 7일)</p>
      <table class="article-list-table" style="margin-bottom:1.5rem">
        <thead><tr><th>경로</th><th style="text-align:right">조회수</th></tr></thead>
        <tbody>${topPagesRows}</tbody>
      </table>
      <p class="card-title" style="font-size:.85rem">유입경로 TOP 10 (최근 7일)</p>
      <table class="article-list-table">
        <thead><tr><th>referrer</th><th style="text-align:right">방문수</th></tr></thead>
        <tbody>${topRefRows}</tbody>
      </table>`;
  } catch (e) {
    wrap.innerHTML = `<p style="color:#c00">네트워크 오류: ${e.message}</p>`;
  }
}

document.getElementById('reload-stats-btn').addEventListener('click', loadStats);

// 글 목록 불러오기
document.getElementById('load-list-btn').addEventListener('click', async () => {
  const val = document.getElementById('manage-subcat').value;
  if (!val) { alert('카테고리를 선택해주세요.'); return; }
  const [catPath, subDir] = val.split('|');
  const wrap = document.getElementById('article-list-wrap');
  wrap.innerHTML = '<p style="color:#aaa;font-size:.85rem">불러오는 중...</p>';

  try {
    const res = await fetch(API.replace('/publish','/list-articles'), {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password:savedPw, catPath, subDir}),
    });
    const data = await res.json();
    if (!res.ok) { wrap.innerHTML = `<p style="color:#c00">${data.error}</p>`; return; }

    if (!data.slugs.length) {
      wrap.innerHTML = '<p class="empty-state">글이 없습니다.</p>';
      return;
    }

    const rows = data.slugs.map(slug => `
      <tr id="row-${slug}">
        <td style="max-width:380px">
          <span class="slug-tag">${slug}</span>
          <span id="title-${slug}" style="display:block;font-size:.82rem;color:#444;margin-top:.3rem">불러오는 중...</span>
        </td>
        <td><a href="https://journal.rococops.com/${catPath}/${subDir}/${slug}/" target="_blank" style="color:#1a7f37;font-size:.82rem">보기 →</a></td>
        <td>
          <button class="btn-del" onclick="deleteArticle('${catPath}','${subDir}','${slug}',this)">삭제</button>
        </td>
      </tr>`).join('');

    wrap.innerHTML = `
      <table class="article-list-table">
        <thead><tr><th>글</th><th>링크</th><th>삭제</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <p style="font-size:.75rem;color:#aaa;margin-top:.75rem">총 ${data.slugs.length}개 (최신순)</p>`;

    // 제목 비동기 로드
    data.slugs.forEach(async slug => {
      try {
        const r = await fetch(`https://journal.rococops.com/${catPath}/${subDir}/${slug}/`);
        const html = await r.text();
        const m = html.match(/<h1[^>]*class="article-title"[^>]*>([^<]+)<\/h1>/);
        const el = document.getElementById(`title-${slug}`);
        if (el) el.textContent = m ? m[1].trim() : '(제목 없음)';
      } catch { /* 무시 */ }
    });
  } catch(e) {
    wrap.innerHTML = `<p style="color:#c00">오류: ${e.message}</p>`;
  }
});

// 삭제
async function deleteArticle(catPath, subDir, slug, btn) {
  if (!confirm(`정말 삭제하시겠습니까?\n${catPath}/${subDir}/${slug}/`)) return;
  btn.disabled = true;
  btn.textContent = '삭제 중...';
  try {
    const res = await fetch(API.replace('/publish','/delete'), {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password:savedPw, catPath, subDir, slug}),
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      btn.closest('tr').remove();
      showMsg(`✅ ${catPath}/${subDir}/${slug}/ 삭제 완료`, 'ok');
    } else {
      btn.disabled = false;
      btn.textContent = '삭제';
      alert('삭제 실패: ' + (data.error||''));
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '삭제';
    alert('오류: ' + e.message);
  }
}
</script>
